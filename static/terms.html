<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Terms of Service — Scaylr</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg"/>
<style>
:root{--bg:#f7f7f9;--surface:#fff;--border:#e2e2ea;--accent:#5b4fd4;--text:#111120;--muted:#55557a;--font-ui:'Syne',sans-serif;--font-mono:'DM Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-ui);background:var(--bg);color:var(--text);}
nav{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 40px;gap:0;}
.nav-logo{font-weight:800;font-size:16px;color:var(--text);text-decoration:none;}
.nav-logo span{color:var(--accent);}
.nav-back{margin-left:24px;font-size:13px;font-family:var(--font-mono);color:var(--muted);text-decoration:none;}
.nav-back:hover{color:var(--text);}
.content{max-width:720px;margin:64px auto;padding:0 24px 80px;}
h1{font-size:36px;font-weight:800;letter-spacing:-.03em;margin-bottom:12px;}
.last-updated{font-size:13px;font-family:var(--font-mono);color:var(--muted);margin-bottom:48px;}
.placeholder{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:48px;text-align:center;}
.placeholder-icon{font-size:48px;margin-bottom:16px;opacity:.3;}
.placeholder h2{font-size:20px;font-weight:800;margin-bottom:8px;}
.placeholder p{font-size:15px;color:var(--muted);line-height:1.65;}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">Sc<span>aylr</span></a>
  <a href="/" class="nav-back">← Back to home</a>
</nav>
<div class="content">
  <h1>Terms of Service</h1>
  <div class="last-updated">Last updated: March 2026</div>
  <div class="placeholder">
    <div class="placeholder-icon">📄</div>
    <h2>Coming soon</h2>
    <p>Our Terms of Service is being drafted and will be published here before we launch paid plans.<br><br>For any questions in the meantime, contact us at <strong>hello@scaylr.io</strong></p>
  </div>
</div>
</body>
</html>
