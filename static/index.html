<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vectorizer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0d0d0f; color: #e0e0e8; height: 100vh; display: grid; grid-template-columns: 280px 1fr; }

aside { background: #111116; border-right: 1px solid #222; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
h1 { font-size: 16px; font-weight: 600; color: #fff; }

.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: #888; display: flex; justify-content: space-between; }
.field label span { color: #ccc; font-family: monospace; }
select { background: #1a1a20; border: 1px solid #333; color: #e0e0e8; padding: 6px 8px; border-radius: 6px; font-size: 12px; width: 100%; }
input[type=range] { width: 100%; accent-color: #6c6af7; }
.sep { border-top: 1px solid #222; }
.btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-main { background: #6c6af7; color: #fff; }
.btn-main:hover { background: #5553d4; }
.btn-main:disabled { opacity: .4; cursor: not-allowed; }
.btn-sec { background: transparent; color: #888; border: 1px solid #333; font-size: 12px; }
.btn-sec:hover { color: #ccc; }
.dropzone { border: 1.5px dashed #333; border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; position: relative; transition: border-color .15s; }
.dropzone:hover, .dropzone.over { border-color: #6c6af7; background: rgba(108,106,247,.06); }
.dropzone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.dropzone p { font-size: 12px; color: #666; margin-top: 6px; }
main { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #222; }
.panel { background: #0d0d0f; display: flex; flex-direction: column; }
.panel-hdr { padding: 8px 14px; background: #111116; border-bottom: 1px solid #222; font-size: 11px; color: #555; display: flex; justify-content: space-between; }
.panel-body { flex: 1; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center;
  background-image: linear-gradient(45deg,#161620 25%,transparent 25%),linear-gradient(-45deg,#161620 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#161620 75%),linear-gradient(-45deg,transparent 75%,#161620 75%);
  background-size: 20px 20px; background-position: 0 0,0 10px,10px -10px,-10px 0; background-color: #1a1a24; }
.panel-body img { max-width: 100%; max-height: 100%; object-fit: contain; }
.panel-body canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
.ph { color: #444; font-size: 12px; }
.spin { width: 30px; height: 30px; border: 2px solid #333; border-top-color: #6c6af7; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.status { font-size: 11px; color: #555; }
.export-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
</style>
</head>
<body>

<aside>
  <h1>⬡ Vectorizer</h1>

  <div class="dropzone" id="dz">
    <input type="file" id="file-input" accept="image/*"/>
    <div>⬆ Drop image here</div>
    <p>PNG · JPG · WEBP · max 20MB</p>
  </div>

  <div class="sep"></div>

  <div class="field">
    <label>Color mode</label>
    <select id="colormode">
      <option value="color">Color</option>
      <option value="binary">Black &amp; White</option>
    </select>
  </div>
  <div class="field">
    <label>Path mode</label>
    <select id="mode">
      <option value="spline">Spline (smooth)</option>
      <option value="polygon">Polygon</option>
    </select>
  </div>
  <div class="field">
    <label>Hierarchical</label>
    <select id="hierarchical">
      <option value="stacked">Stacked</option>
      <option value="cutout">Cutout</option>
    </select>
  </div>

  <div class="sep"></div>

  <div class="field">
    <label>Color precision <span id="v-cp">8</span></label>
    <input type="range" id="color-precision" min="1" max="8" value="8"/>
  </div>
  <div class="field">
    <label>Layer difference <span id="v-ld">2</span></label>
    <input type="range" id="layer-difference" min="1" max="64" value="2"/>
  </div>
  <div class="field">
    <label>Filter speckle <span id="v-fs">4</span> <small>noise removal</small></label>
    <input type="range" id="filter-speckle" min="0" max="32" value="4"/>
  </div>
  <div class="field">
    <label>Corner threshold <span id="v-ct">60</span>° <small>sharpness</small></label>
    <input type="range" id="corner-threshold" min="1" max="180" value="60"/>
  </div>
  <div class="field">
    <label>Length threshold <span id="v-lt">4.0</span> <small>path detail</small></label>
    <input type="range" id="length-threshold" min="3.5" max="10" step="0.5" value="4.0"/>
  </div>
  <div class="field">
    <label>Max iterations <span id="v-mi">10</span> <small>curve quality</small></label>
    <input type="range" id="max-iterations" min="1" max="30" value="10"/>
  </div>
  <div class="field">
    <label>Splice threshold <span id="v-st">45</span>° <small>curve splitting</small></label>
    <input type="range" id="splice-threshold" min="1" max="180" value="45"/>
  </div>
  <div class="field">
    <label>Path precision <span id="v-pp">3</span> <small>decimal places</small></label>
    <input type="range" id="path-precision" min="1" max="8" value="3"/>
  </div>

  <div class="sep"></div>

  <!-- Presets -->
  <div style="font-size:10px;color:#555;margin-bottom:4px">PRESETS</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
    <button class="btn btn-sec" onclick="applyPreset('illustration')">Illustration</button>
    <button class="btn btn-sec" onclick="applyPreset('gradient')">Gradient</button>
    <button class="btn btn-sec" onclick="applyPreset('logo')">Logo / Flat</button>
    <button class="btn btn-sec" onclick="applyPreset('lineart')">Line art</button>
  </div>

  <div class="sep"></div>

  <div class="status" id="status">Ready</div>
  <button class="btn btn-main" id="btn-run" disabled>Vectorize</button>

  <div id="export-section" style="display:none; flex-direction:column; gap:6px;">
    <div style="font-size:10px;color:#555;text-align:center">Export</div>
    <div class="export-grid">
      <button class="btn btn-sec" onclick="exportAs('svg')">SVG</button>
      <button class="btn btn-sec" onclick="exportAs('png')">PNG</button>
      <button class="btn btn-sec" onclick="exportAs('jpg')">JPG</button>
      <button class="btn btn-sec" onclick="newImg()">+ New</button>
    </div>
  </div>
</aside>

<main>
  <div class="panel">
    <div class="panel-hdr"><span>ORIGINAL</span><span id="orig-meta"></span></div>
    <div class="panel-body" id="panel-orig"><div class="ph">No image loaded</div></div>
  </div>
  <div class="panel">
    <div class="panel-hdr"><span>VECTOR RESULT</span><span id="svg-meta"></span></div>
    <div class="panel-body" id="panel-svg"><div class="ph">Result will appear here</div></div>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);

[['color-precision','v-cp'],['layer-difference','v-ld'],['filter-speckle','v-fs'],
 ['corner-threshold','v-ct'],['length-threshold','v-lt'],['max-iterations','v-mi'],
 ['splice-threshold','v-st'],['path-precision','v-pp']].forEach(([id,lbl]) => {
  $(id).addEventListener('input', () => {
    $(lbl).textContent = (+$(id).value).toFixed(id==='length-threshold'?1:0);
  });
});

// Presets
const PRESETS = {
  illustration: { colormode:'color',  hierarchical:'stacked', mode:'spline',   cp:8, ld:2,  fs:4,  ct:60,  lt:4.0, mi:10, st:45, pp:3 },
  gradient:     { colormode:'color',  hierarchical:'stacked', mode:'spline',   cp:8, ld:2,  fs:0,  ct:60,  lt:4.0, mi:20, st:45, pp:8 },
  logo:         { colormode:'color',  hierarchical:'stacked', mode:'spline',   cp:8, ld:16, fs:4,  ct:60,  lt:4.0, mi:10, st:45, pp:3 },
  lineart:      { colormode:'binary', hierarchical:'stacked', mode:'spline',   cp:6, ld:16, fs:4,  ct:60,  lt:4.0, mi:10, st:45, pp:3 },
};

function applyPreset(name) {
  const p = PRESETS[name]; if (!p) return;
  $('colormode').value        = p.colormode;
  $('hierarchical').value     = p.hierarchical;
  $('mode').value             = p.mode;
  $('color-precision').value  = p.cp;  $('v-cp').textContent = p.cp;
  $('layer-difference').value = p.ld;  $('v-ld').textContent = p.ld;
  $('filter-speckle').value   = p.fs;  $('v-fs').textContent = p.fs;
  $('corner-threshold').value = p.ct;  $('v-ct').textContent = p.ct;
  $('length-threshold').value = p.lt;  $('v-lt').textContent = p.lt.toFixed(1);
  $('max-iterations').value   = p.mi;  $('v-mi').textContent = p.mi;
  $('splice-threshold').value = p.st;  $('v-st').textContent = p.st;
  $('path-precision').value   = p.pp;  $('v-pp').textContent = p.pp;
}

const dz = $('dz'), fi = $('file-input');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); if(e.dataTransfer.files[0]) load(e.dataTransfer.files[0]); });
fi.addEventListener('change', e => { if(e.target.files[0]) { load(e.target.files[0]); fi.value=''; } });

let currentFile = null;
let currentSvgText = null;
let currentSvgUrl = null;
let origW = 0, origH = 0;

function load(f) {
  currentFile = f;
  currentSvgText = null;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      origW = img.naturalWidth;
      origH = img.naturalHeight;
      $('panel-orig').innerHTML = '';
      const el = document.createElement('img');
      el.src = e.target.result;
      $('panel-orig').appendChild(el);
      $('orig-meta').textContent = `${origW}×${origH}`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
  $('btn-run').disabled = false;
  $('export-section').style.display = 'none';
  $('panel-svg').innerHTML = '<div class="ph">Result will appear here</div>';
  $('svg-meta').textContent = '';
  $('status').textContent = 'Ready';
}

function newImg() { fi.click(); }

// Render SVG to canvas at target resolution using browser's vector renderer
// Critical: set width/height on SVG element before creating blob URL,
// otherwise browser rasterizes at SVG's native size then scales pixels up
function svgToCanvas(svgText, targetW, targetH) {
  return new Promise((resolve, reject) => {
    // Inject target dimensions into SVG so browser renders at full resolution
    // viewBox preserves the path coordinate space, width/height sets render size
    // Extract current width/height to use as viewBox
    const wMatch = svgText.match(/width="([\d.]+)"/);
    const hMatch = svgText.match(/height="([\d.]+)"/);
    const svgW = wMatch ? wMatch[1] : targetW;
    const svgH = hMatch ? hMatch[1] : targetH;

    let sized = svgText
      .replace(/width="[\d.]+"/, `width="${targetW}"`)
      .replace(/height="[\d.]+"/, `height="${targetH}"`);

    // Add viewBox if not present so paths scale correctly
    if (!sized.includes('viewBox')) {
      sized = sized.replace(
        `height="${targetH}"`,
        `height="${targetH}" viewBox="0 0 ${svgW} ${svgH}"`
      );
    }

    const blob = new Blob([sized], {type:'image/svg+xml'});
    const url  = URL.createObjectURL(blob);
    const img  = new Image();
    img.width  = targetW;
    img.height = targetH;
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width  = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, targetW, targetH);
      URL.revokeObjectURL(url);
      resolve(canvas);
    };
    img.onerror = reject;
    img.src = url;
  });
}

$('btn-run').addEventListener('click', async () => {
  if (!currentFile) return;
  $('btn-run').disabled = true;
  $('export-section').style.display = 'none';
  $('panel-svg').innerHTML = '<div class="spin"></div>';
  $('status').textContent = 'Tracing…';

  const fd = new FormData();
  fd.append('file',             currentFile);
  fd.append('colormode',        $('colormode').value);
  fd.append('mode',             $('mode').value);
  fd.append('hierarchical',     $('hierarchical').value);
  fd.append('color_precision',  $('color-precision').value);
  fd.append('layer_difference', $('layer-difference').value);
  fd.append('filter_speckle',   $('filter-speckle').value);
  fd.append('corner_threshold', $('corner-threshold').value);
  fd.append('length_threshold', $('length-threshold').value);
  fd.append('max_iterations',   $('max-iterations').value);
  fd.append('splice_threshold', $('splice-threshold').value);
  fd.append('path_precision',   $('path-precision').value);

  try {
    const res  = await fetch('/api/vectorize', {method:'POST', body:fd});
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    const svgRes  = await fetch(data.preview);
    const svgText = await svgRes.text();
    currentSvgText = svgText;
    currentSvgUrl  = data.download;

    // Try canvas rendering first, fall back to direct SVG display
    $('status').textContent = 'Rendering…';
    try {
      const canvas = await svgToCanvas(svgText, origW, origH);
      $('panel-svg').innerHTML = '';
      $('panel-svg').appendChild(canvas);
    } catch(renderErr) {
      // Fallback: display SVG directly
      $('panel-svg').innerHTML = '';
      const parser = new DOMParser();
      const doc    = parser.parseFromString(svgText, 'image/svg+xml');
      const svgEl  = document.importNode(doc.querySelector('svg'), true);
      svgEl.style.maxWidth = '100%';
      svgEl.style.maxHeight = '100%';
      $('panel-svg').appendChild(svgEl);
    }

    const paths = svgText.match(/<path/g)?.length ?? 0;
    $('svg-meta').textContent = `${paths} paths`;
    $('status').textContent = `Done in ${data.elapsed}s`;
    $('export-section').style.display = 'flex';
  } catch(e) {
    $('status').textContent = 'Error: ' + e.message;
    $('panel-svg').innerHTML = `<div class="ph">Error: ${e.message}</div>`;
  } finally {
    $('btn-run').disabled = false;
  }
});

async function exportAs(fmt) {
  if (!currentSvgText) return;

  if (fmt === 'svg') {
    const a = document.createElement('a');
    a.href = currentSvgUrl;
    a.download = 'vector.svg';
    a.click();
    return;
  }

  // Export at high resolution — 4000px on longest side
  const EXPORT_PX = 4000;
  const scale  = EXPORT_PX / Math.max(origW, origH);
  const expW   = Math.round(origW * scale);
  const expH   = Math.round(origH * scale);

  $('status').textContent = `Exporting at ${expW}×${expH}…`;
  const canvas = await svgToCanvas(currentSvgText, expW, expH);

  if (fmt === 'jpg') {
    const ctx = document.createElement('canvas').getContext('2d');
    // Add white background for JPG
    const c2 = document.createElement('canvas');
    c2.width = expW; c2.height = expH;
    const ctx2 = c2.getContext('2d');
    ctx2.fillStyle = '#ffffff';
    ctx2.fillRect(0, 0, expW, expH);
    ctx2.drawImage(canvas, 0, 0);
    c2.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'vector.jpg';
      a.click();
    }, 'image/jpeg', 0.95);
  } else {
    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'vector.png';
      a.click();
    }, 'image/png');
  }
  $('status').textContent = 'Exported!';
}
</script>
</body>
</html>
